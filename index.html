        // 初始化语音合成（安卓兼容性处理）
        function initSpeech() {
            if (!('speechSynthesis' in window)) {
                console.log('浏览器不支持语音合成');
                return false;
            }
            
            if (!speechInitialized) {
                // 安卓设备需要先调用一次来初始化
                window.speechSynthesis.cancel();
                
                // 等待语音列表加载
                const loadVoices = () => {
                    const voices = window.speechSynthesis.getVoices();
                    console.log('可用语音数量:', voices.length);
                    
                    // 找到中文语音
                    const chineseVoice = voices.find(voice => 
                        voice.lang === 'zh-CN' || 
                        voice.lang === 'zh_CN' ||
                        voice.lang === 'zh' ||
                        voice.name.includes('Chinese')
                    );
                    
                    if (chineseVoice) {
                        console.log('找到中文语音:', chineseVoice.name);
                    } else {
                        console.warn('未找到中文语音，将使用默认语音');
                    }
                    
                    speechInitialized = true;
                };
                
                // Chrome 需要监听 voiceschanged 事件
                if ('onvoiceschanged' in window.speechSynthesis) {
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }
                
                // 尝试立即加载
                loadVoices();
                
                // 延迟再次尝试（确保加载完成）
                setTimeout(loadVoices, 500);
            }
            
            return true;
        }

        // 获取笔画名称 - 智能预测功能
        function getStrokeNameByCharacter(char, strokeNum) {
            // 首先检查映射表
            if (HANZI_STROKES[char] && HANZI_STROKES[char][strokeNum]) {
                return HANZI_STROKES[char][strokeNum];
            }
            
            // 映射表中没有，使用智能预测
            return predictStrokeName(char, strokeNum);
        }
        
        // 智能预测笔画名称
        function predictStrokeName(char, strokeNum) {
            // 基于笔画顺序的简单预测
            const strokeTypes = [
                '横', '竖', '撇', '捺', '点', '提', '钩', '折',
                '横撇', '横钩', '横折', '横折钩', '横撇弯钩',
                '竖钩', '竖提', '竖折', '竖折撇',
                '撇点', '撇折',
                '斜钩', '弯钩', '卧钩',
                '竖弯钩', '横撇', '竖折折钩', '横折折折钩'
            ];
            
            // 常见笔画顺序模式
            const commonPatterns = {
                1: ['横', '竖', '撇', '点'],
                2: ['横', '横', '竖', '撇', '捺'],
                3: ['横', '竖', '竖', '撇', '捺'],
                4: ['竖', '横折', '横', '横'],
                5: ['横', '竖', '撇', '点'],
                6: ['横', '撇', '竖弯钩'],
                7: ['竖', '横折', '横'],
                8: ['横', '撇', '捺']
            };
            
            // 根据笔画数选择模式
            const patterns = commonPatterns[strokeNum + 1] || strokeTypes;
            return patterns[strokeNum % patterns.length] || `第${strokeNum + 1}笔`;
        }
        
        // 语音朗读（安卓兼容性优化）
        function speak(text, callback) {
            if (!text) {
                if (callback) callback();
                return;
            }
            
            console.log('开始朗读:', text);
            console.log('设备类型:', isAndroid ? 'Android' : (isIOS ? 'iOS' : 'PC'));
            
            // 初始化语音合成
            if (!initSpeech()) {
                console.error('语音合成不支持');
                if (callback) callback();
                return;
            }
            
            // 取消之前的语音
            window.speechSynthesis.cancel();
            
            // 创建语音实例
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.7;
            utterance.pitch = 1.2;
            utterance.volume = 1.0;
            
            // 为安卓设备选择合适的中文语音
            if (isAndroid) {
                const voices = window.speechSynthesis.getVoices();
                console.log('安卓设备语音列表:', voices.length);
                
                // 优先选择中文语音
                const chineseVoices = voices.filter(voice => 
                    voice.lang === 'zh-CN' || 
                    voice.lang === 'zh_CN' ||
                    voice.lang === 'zh' ||
                    voice.name.includes('Chinese') ||
                    voice.name.includes('中文')
                );
                
                if (chineseVoices.length > 0) {
                    utterance.voice = chineseVoices[0];
                    console.log('使用中文语音:', chineseVoices[0].name);
                } else {
                    console.warn('未找到中文语音，使用默认语音');
                }
            }
            
            // 事件处理
            utterance.onstart = function() {
                console.log('语音开始播放');
            };
            
            utterance.onend = function() {
                console.log('语音播放完成');
                if (callback) callback();
            };
            
            utterance.onerror = function(event) {
                console.error('语音播放错误:', event.error);
                
                // 安卓常见错误处理
                if (event.error === 'not-allowed') {
                    console.error('用户拒绝了语音权限');
                } else if (event.error === 'network') {
                    console.error('网络错误，某些浏览器需要网络');
                }
                
                if (callback) callback();
            };
            
            utterance.onpause = function() {
                console.log('语音暂停');
            };
            
            utterance.onresume = function() {
                console.log('语音恢复');
            };
            
            // 播放语音
            try {
                window.speechSynthesis.speak(utterance);
                
                // 安卓设备需要额外处理：确保语音不被挂起
                if (isAndroid) {
                    const checkInterval = setInterval(() => {
                        if (!window.speechSynthesis.speaking) {
                            clearInterval(checkInterval);
                            return;
                        }
                        window.speechSynthesis.pause();
                        window.speechSynthesis.resume();
                    }, 10000); // 每10秒刷新一次
                    
                    utterance.onend = function() {
                        clearInterval(checkInterval);
                        if (callback) callback();
                    };
                    
                    utterance.onerror = function() {
                        clearInterval(checkInterval);
                        if (callback) callback();
                    };
                }
            } catch (error) {
                console.error('语音播放异常:', error);
                if (callback) callback();
            }
        }
        
        function drawGrid() {
            const canvas = document.getElementById('gridCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 240, 240);
            
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, 240, 240);
            
            ctx.beginPath();
            ctx.setLineDash([5, 5]);
            ctx.moveTo(0, 0); ctx.lineTo(240, 240);
            ctx.moveTo(240, 0); ctx.lineTo(0, 240);
            ctx.moveTo(120, 0); ctx.lineTo(120, 240);
            ctx.moveTo(0, 120); ctx.lineTo(240, 120);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(() => msg.textContent = '', 3000);
        }
        
        function getPinyin(char) {
            if (pinyinProLoaded && typeof pinyinPro !== 'undefined') {
                try {
                    return pinyinPro.pinyin(char, { toneType: 'symbol', type: 'string' }) || '';
                } catch (e) { return ''; }
            }
            return '';
        }
        
        function getStrokeCount() {
            if (!writer || !characterData) return 0;
            if (characterData.strokes) {
                return characterData.strokes.length;
            }
            if (writer.character && writer.character.strokes) {
                return writer.character.strokes.length;
            }
            return 0;
        }
        
        // 将数字转换为中文数字
        function toChineseNumber(num) {
            const chineseNums = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
            if (num <= 10) {
                return chineseNums[num];
            } else if (num < 20) {
                return '十' + (num % 10 !== 0 ? chineseNums[num % 10] : '');
            } else {
                return num.toString(); // 超过19就直接读数字
            }
        }
        
        async function loadCharacter() {
            const input = document.getElementById('charInput');
            const char = input.value.trim();
            
            if (!char) {
                showMessage('请输入一个汉字！', 'error');
                return;
            }
            if (char.length > 1) {
                showMessage('一次只能学习一个汉字！', 'error');
                return;
            }
            
            
            currentCharacter = char;
            quizMode = false;
            characterData = null;
            
            if (writer) writer = null;
            
            const svg = document.getElementById('characterSvg');
            while (svg.firstChild) svg.removeChild(svg.firstChild);
            
            const pinyin = getPinyin(char);
            document.getElementById('pinyinDisplay').textContent = pinyin || char;
            document.getElementById('strokeCountDisplay').textContent = '';
            
            try {
                writer = HanziWriter.create('characterSvg', char, {
                    width: 240, height: 240, padding: 15,
                    showOutline: true,
                    strokeAnimationSpeed: 1,
                    delayBetweenStrokes: 1500,
                    strokeColor: '#000000',
                    outlineColor: '#e0e0e0',
                    showCharacter: false,
                    onLoadCharDataSuccess: function(data) {
                        characterData = data;
                        const strokeCount = getStrokeCount();
                        
                        if (HANZI_STROKES[char]) {
                        } else {
                        }
                        
                        document.getElementById('strokeCountDisplay').textContent = `共 ${strokeCount} 笔`;
                        
                        // 朗读拼音和笔画数
                        setTimeout(() => {
                            const pinyinText = `${char}，读音：${pinyin}，共 ${strokeCount} 笔`;
                            speak(pinyinText);
                        }, 300);
                    },
                    onLoadCharDataError: () => {
                        showMessage('这个汉字暂时没有笔画数据', 'error');
                    }
                });
                
                drawGrid();
                showMessage(`开始学习"${char}"字`, 'success');
                
            } catch (error) {
                showMessage('加载失败，请重试', 'error');
                console.error(error);
            }
        }
        
        function animateStroke() {
            if (!writer) {
                showMessage('请先输入汉字', 'error');
                return;
            }
            
            
            const pinyin = getPinyin(currentCharacter);
            
            // 朗读拼音
            speak(pinyin);
            
            // 隐藏汉字
            writer.hideCharacter();
            
            const strokeCount = getStrokeCount();
            
            if (HANZI_STROKES[currentCharacter]) {
            }
            
            // 开始演示
            setTimeout(() => {
                
                // 可调整的参数
                const animationSpeed = 0.5;      // 动画速度（越小越慢）
                const strokeDelay = 1500;         // 笔画间延迟（毫秒）- 从2500ms减少到1500ms
                const voiceDelay = 0;             // 语音延迟（毫秒，相对于动画开始）- 立即朗读
                
                writer.animateCharacter({
                    strokeAnimationSpeed: animationSpeed,
                    delayBetweenStrokes: strokeDelay,
                    onCompleteStroke: function(index, strokeData) {
                        
                        const strokeName = getStrokeNameByCharacter(currentCharacter, index);
                        
                        // 立即朗读
                        speak(strokeName);
                    },
                    onComplete: function() {
                        showMessage('笔画演示完成', 'success');
                        setTimeout(() => speak('写完了！'), 1000);
                    }
                });
                
                // 备用方案：使用定时器朗读
                // 时间计算：第N笔的朗读时间 = voiceDelay + (N-1) * strokeDelay
                let currentStroke = 0;
                const checkInterval = setInterval(() => {
                    if (currentStroke >= strokeCount) {
                        clearInterval(checkInterval);
                        return;
                    }
                    
                    const strokeNumber = currentStroke + 1;
                    const voiceText = `第${toChineseNumber(strokeNumber)}笔`;
                    const timing = voiceDelay + (currentStroke * strokeDelay);
                    
                    setTimeout(() => {
                        window.speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance(voiceText);
                        utterance.lang = 'zh-CN';
                        utterance.rate = 0.7;
                        utterance.pitch = 1.2;
                        window.speechSynthesis.speak(utterance);
                    }, timing);
                    
                    currentStroke++;
                }, 100); // 每100ms检查一次
                
            }, 1500);
        }
        
        function startQuiz() {
            if (!writer) {
                showMessage('请先输入汉字', 'error');
                return;
            }
            
            quizMode = true;
            showMessage('请在田字格中按正确顺序书写', 'success');
            
            writer.quiz({
                onMistake: function(strokeData) {
                    showMessage('顺序不对，再试一次', 'error');
                    const strokeNumber = strokeData.strokeNum + 1;
                    speak(`第${toChineseNumber(strokeNumber)}笔，顺序不对哦`);
                },
                onCorrectStroke: function(strokeData) {
                    const strokeNumber = strokeData.strokeNum + 1;
                    speak(`第${toChineseNumber(strokeNumber)}笔`);
                },
                onComplete: function() {
                    quizMode = false;
                    showMessage('太棒了！你写对了！', 'success');
                    speak('太棒了！你写对了');
                }
            });
        }
        
        function resetCharacter() {
            if (!writer) return;
            quizMode = false;
            writer.hideCharacter();
            showMessage('已重置', 'success');
        }
        
        // 测试语音功能
        function testSpeech() {
            console.log('开始测试语音...');
            console.log('设备类型:', isAndroid ? 'Android' : (isIOS ? 'iOS' : 'PC'));
            
            if (!('speechSynthesis' in window)) {
                showMessage('您的浏览器不支持语音功能', 'error');
                return;
            }
            
            const voices = window.speechSynthesis.getVoices();
            console.log('可用语音数量:', voices.length);
            
            const chineseVoices = voices.filter(voice => 
                voice.lang === 'zh-CN' || 
                voice.lang === 'zh_CN' ||
                voice.lang === 'zh' ||
                voice.name.includes('Chinese')
            );
            
            console.log('中文语音数量:', chineseVoices.length);
            
            if (chineseVoices.length > 0) {
                const voiceNames = chineseVoices.map(v => v.name).join(', ');
                console.log('中文语音:', voiceNames);
            }
            
            // 测试朗读
            const testText = '你好，我是汉字笔顺学习助手，语音功能正常！';
            showMessage('正在测试语音...', 'success');
            
            speak(testText, function() {
                showMessage('语音测试完成！', 'success');
            });
        }
        
        // 页面加载
        window.onload = function() {
            if (typeof pinyinPro !== 'undefined') pinyinProLoaded = true;
            drawGrid();
            
            // 初始化语音合成
            setTimeout(() => {
                const speechSupported = initSpeech();
                if (speechSupported) {
                    console.log('语音合成初始化成功');
                    // 安卓设备测试语音
                    if (isAndroid) {
                        console.log('安卓设备，准备语音测试');
                    }
                } else {
                    console.warn('浏览器不支持语音合成');
                }
            }, 100);
            
            document.getElementById('charInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') loadCharacter();
            });
            
            // 添加触摸事件监听（移动端兼容）
            document.addEventListener('touchstart', function() {
                // 触摸时确保语音引擎激活
                if ('speechSynthesis' in window && !speechInitialized) {
                    initSpeech();
                }
            }, { once: true });
        };
    </script>
