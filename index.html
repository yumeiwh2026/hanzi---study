<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 汉字笔顺学习工具</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <script src="https://unpkg.com/pinyin-pro"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --grid-color: #dcdde1;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f6fa;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        #pinyin-display {
            font-size: 24px;
            color: var(--accent-color);
            height: 30px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* 田字格样式 */
        #target-grid {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border: 2px solid var(--primary-color);
            background-image: 
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 50% 50%, 50% 50%, 100% 100%, 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        input {
            padding: 10px;
            font-size: 18px;
            width: 60%;
            border: 2px solid #ddd;
            border-radius: 5px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            margin-left: 10px;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>写字好帮手 ✨</h2>
    
    <div id="pinyin-display"></div>
    <div id="target-grid"></div>

    <div class="input-area">
        <input type="text" id="char-input" placeholder="输入一个汉字" maxlength="1">
        <button onclick="startLearning()">开始</button>
    </div>

    <div class="controls">
        <button onclick="writer.animateCharacter()">重播笔画</button>
        <button onclick="speak()">听读音 🔊</button>
    </div>
</div>

<script>
    let writer;
    const { pinyin } = pinyinPro;

    function initWriter(char) {
        // 清除旧内容
        document.getElementById('target-grid').innerHTML = '';
        
        // 创建新的 Hanzi Writer 实例
        writer = HanziWriter.create('target-grid', char, {
            width: 200,
            height: 200,
            padding: 5,
            showOutline: true,
            strokeAnimationSpeed: 1, // 笔画速度
            delayBetweenStrokes: 500, // 笔画间隔
            strokeColor: '#2c3e50' // 笔画颜色
        });

        // 自动演示
        writer.animateCharacter();
        
        // 更新拼音
        const charPinyin = pinyin(char);
        document.getElementById('pinyin-display').innerText = charPinyin;
        
        // 自动读音
        speak(char);
    }

    function startLearning() {
        const char = document.getElementById('char-input').value;
        if (char && /^[\u4e00-\u9fa5]$/.test(char)) {
            initWriter(char);
        } else {
            alert("请输入一个中文字符哦~");
        }
    }

    function speak(text) {
        const char = text || document.getElementById('char-input').value;
        if (!char) return;
        
        const utterance = new SpeechSynthesisUtterance(char);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.8; // 稍微慢一点，适合小朋友听
        window.speechSynthesis.speak(utterance);
    }

    // 初始化显示一个“大”字（应景大理）
    window.onload = () => {
        initWriter('大');
    };
</script>

</body>
</html>
